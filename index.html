<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Market Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #ffffff; font-family: sans-serif; }
        .market-card { background: #0a0a0a; border-left: 4px solid #333; height: 100%; }
        .clock-wrapper { width: 110px; height: 110px; }
        .clock-svg { width: 100%; height: 100%; }
        .hand-group { transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .hour-hand { stroke: #4b5563; stroke-width: 4; stroke-linecap: round; }
        .min-hand { stroke: #d1d5db; stroke-width: 2.5; stroke-linecap: round; }
        .sec-hand { stroke: #ef4444; stroke-width: 1.5; stroke-linecap: round; }
        .tick-hour { stroke: #ffffff; stroke-width: 2; }
        .tick-min { stroke: #6b7280; stroke-width: 1.5; }
    </style>
</head>
<body class="p-1">
    <header class="mb-2 border-b border-gray-900 pb-2 px-2">
        <h1 class="text-xl font-bold">Mercados Globales</h1>
    </header>

    <div id="clock-grid" class="grid grid-cols-2 gap-1 px-1"></div>

    <script>
        const markets = [
            { name: "NYSE", tz: "America/New_York", open: "09:30", close: "16:00" },
            { name: "LSE", tz: "Europe/London", open: "08:00", close: "16:30" },
            { name: "TSE", tz: "Asia/Tokyo", open: "09:00", close: "15:00" },
            { name: "ASX", tz: "Australia/Sydney", open: "10:00", close: "16:00" }
        ];

        function createClocks() {
            const grid = document.getElementById('clock-grid');
            markets.forEach((m, index) => {
                const card = document.createElement('div');
                card.className = 'market-card p-2 rounded flex flex-col items-center justify-center gap-1';
                card.innerHTML = `
                    <div class="clock-wrapper">
                        <svg class="clock-svg" viewBox="0 0 80 80">
                            <circle cx="40" cy="40" r="38" stroke="#333" stroke-width="2" fill="none"/>
                            <g id="ticks-${index}"></g>
                            <g id="group-hour-${index}" class="hand-group"><line x1="40" y1="40" x2="40" y2="20" class="hour-hand"/></g>
                            <g id="group-min-${index}" class="hand-group"><line x1="40" y1="40" x2="40" y2="12" class="min-hand"/></g>
                            <g id="group-sec-${index}" class="hand-group"><line x1="40" y1="40" x2="40" y2="8" class="sec-hand"/></g>
                            <circle cx="40" cy="40" r="2" fill="#ef4444"/>
                        </svg>
                    </div>
                    <div class="text-center w-full">
                        <h2 class="text-[14px] font-bold truncate">${m.name}</h2>
                        <p class="text-[10px] text-gray-500 uppercase">A:${m.open} C:${m.close}</p>
                        <div id="digital-${index}" class="font-mono text-[18px] font-bold text-gray-300">00:00:00</div>
                    </div>
                `;
                grid.appendChild(card);
                drawTicks(index);
            });
        }

        function drawTicks(idx) {
            const g = document.getElementById(`ticks-${idx}`);
            for (let i = 0; i < 60; i++) {
                const angle = i * 6;
                const isHour = i % 5 === 0;
                const tick = document.createElementNS("http://www.w3.org/2000/svg", "line");
                tick.setAttribute("x1", 40 + (isHour ? 32 : 35) * Math.cos(angle * Math.PI / 180));
                tick.setAttribute("y1", 40 + (isHour ? 32 : 35) * Math.sin(angle * Math.PI / 180));
                tick.setAttribute("x2", 40 + 38 * Math.cos(angle * Math.PI / 180));
                tick.setAttribute("y2", 40 + 38 * Math.sin(angle * Math.PI / 180));
                tick.setAttribute("class", isHour ? "tick-hour" : "tick-min");
                g.appendChild(tick);
            }
        }

        function update() {
            markets.forEach((m, index) => {
                const now = new Date(new Date().toLocaleString("en-US", { timeZone: m.tz }));
                const hDeg = (now.getHours() % 12) * 30 + now.getMinutes() * 0.5;
                const mDeg = now.getMinutes() * 6 + now.getSeconds() * 0.1;
                const sDeg = now.getSeconds() * 6;

                document.getElementById(`group-hour-${index}`).setAttribute('transform', `rotate(${hDeg} 40 40)`);
                document.getElementById(`group-min-${index}`).setAttribute('transform', `rotate(${mDeg} 40 40)`);
                document.getElementById(`group-sec-${index}`).setAttribute('transform', `rotate(${sDeg} 40 40)`);
                document.getElementById(`digital-${index}`).innerText = now.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
            });
        }

        createClocks();
        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
