<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Market Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Devanagari:wght@300;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #F2E8CF; font-family: 'Inter', sans-serif; }
        .market-card { background: #0a0a0a; border: 1px solid #1a1a1a; }
        .clock-container { width: 100%; max-width: 140px; aspect-ratio: 1 / 1; margin: 0 auto; }
        .tech-font-bold { font-family: 'IBM Plex Sans Devanagari', sans-serif; font-weight: 700; }
        .tech-font-light { font-family: 'IBM Plex Sans Devanagari', sans-serif; font-weight: 300; }
        .hand-group { transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .hour-hand { stroke: #F2E8CF; stroke-width: 5; stroke-linecap: round; }
        .min-hand { stroke: #F2E8CF; stroke-width: 3; stroke-linecap: round; }
        .sec-hand { stroke: #BC4749; stroke-width: 2; stroke-linecap: round; }
        .tick-hour { stroke: #F2E8CF; stroke-width: 2.5; }
        .tick-min { stroke: #F2E8CF; stroke-opacity: 0.3; stroke-width: 1.5; }
        .market-arc { fill: none; stroke-width: 8; stroke-linecap: butt; }
    </style>
</head>
<body class="p-4">
    <header class="mb-8 border-b border-[#1a1a1a] pb-4 px-2">
        <h1 class="text-3xl font-bold tracking-tight">Global Market Watch</h1>
    </header>

    <div id="clock-grid" class="grid grid-cols-2 lg:grid-cols-4 gap-6 px-2"></div>

    <script>
        const markets = [
            { name: "NewYork", tz: "America/New_York", open: "09:30", close: "16:00" },
            { name: "Europa", tz: "Europe/London", open: "08:00", close: "16:30" },
            { name: "Tokio", tz: "Asia/Tokyo", open: "09:00", close: "15:00" },
            { name: "Australia", tz: "Australia/Sydney", open: "10:00", close: "16:00" }
        ];

        function timeToDegrees(timeStr) {
            const [h, m] = timeStr.split(':').map(Number);
            return ((h % 12) * 30) + (m * 0.5) - 90;
        }

        function createClocks() {
            const grid = document.getElementById('clock-grid');
            markets.forEach((m, index) => {
                const card = document.createElement('div');
                card.className = 'market-card p-6 rounded-2xl flex flex-col items-center gap-3';
                card.innerHTML = `
                    <div class="clock-container">
                        <svg class="w-full h-full" viewBox="0 0 80 80">
                            <circle cx="40" cy="40" r="36" stroke="#1a1a1a" stroke-width="8" fill="none"/>
                            <path id="arc-${index}" class="market-arc" d=""/>
                            <g id="ticks-${index}"></g>
                            <g id="group-hour-${index}" class="hand-group"><line x1="40" y1="40" x2="40" y2="20" class="hour-hand"/></g>
                            <g id="group-min-${index}" class="hand-group"><line x1="40" y1="40" x2="40" y2="12" class="min-hand"/></g>
                            <g id="group-sec-${index}" class="hand-group"><line x1="40" y1="40" x2="40" y2="8" class="sec-hand"/></g>
                        </svg>
                    </div>
                    <div class="text-center w-full">
                        <h2 class="text-xl font-bold">${m.name}</h2>
                        <p class="text-sm opacity-60 uppercase tracking-widest font-medium">${m.open} - ${m.close}</p>
                        <div id="digital-${index}" class="text-3xl text-[#F2E8CF] mt-2 tracking-tighter"></div>
                    </div>
                `;
                grid.appendChild(card);
                drawTicks(index);
            });
        }

        function drawTicks(idx) {
            const g = document.getElementById(`ticks-${idx}`);
            for (let i = 0; i < 60; i++) {
                const angle = i * 6;
                const isHour = i % 5 === 0;
                const tick = document.createElementNS("http://www.w3.org/2000/svg", "line");
                const r1 = isHour ? 30 : 33;
                const r2 = 36;
                tick.setAttribute("x1", 40 + r1 * Math.cos(angle * Math.PI / 180));
                tick.setAttribute("y1", 40 + r1 * Math.sin(angle * Math.PI / 180));
                tick.setAttribute("x2", 40 + r2 * Math.cos(angle * Math.PI / 180));
                tick.setAttribute("y2", 40 + r2 * Math.sin(angle * Math.PI / 180));
                tick.setAttribute("class", isHour ? "tick-hour" : "tick-min");
                g.appendChild(tick);
            }
        }

        function update() {
            markets.forEach((m, index) => {
                const now = new Date(new Date().toLocaleString("en-US", { timeZone: m.tz }));
                const currentMinutes = now.getHours() * 60 + now.getMinutes();
                const [oH, oM] = m.open.split(':').map(Number);
                const [cH, cM] = m.close.split(':').map(Number);
                const isOpen = currentMinutes >= (oH * 60 + oM) && currentMinutes < (cH * 60 + cM);
                
                const arc = document.getElementById(`arc-${index}`);
                arc.setAttribute("stroke", isOpen ? "#A7C957" : "#BC4749");
                // Opacidad ajustada: 0.72 (abierto) y 0.4 (cerrado)
                arc.setAttribute("stroke-opacity", isOpen ? "0.72" : "0.4");
                
                const startAngle = timeToDegrees(m.open);
                const endAngle = timeToDegrees(m.close);
                const angleDiff = endAngle - startAngle;
                const largeArc = angleDiff > 0 && angleDiff <= 180 ? 0 : 1;
                
                arc.setAttribute("d", describeArc(40, 40, 36, startAngle, endAngle, largeArc));

                document.getElementById(`group-hour-${index}`).setAttribute('transform', `rotate(${(now.getHours() % 12) * 30 + now.getMinutes() * 0.5} 40 40)`);
                document.getElementById(`group-min-${index}`).setAttribute('transform', `rotate(${now.getMinutes() * 6 + now.getSeconds() * 0.1} 40 40)`);
                document.getElementById(`group-sec-${index}`).setAttribute('transform', `rotate(${now.getSeconds() * 6} 40 40)`);
                
                const hh = now.getHours().toString().padStart(2, '0');
                const mm = now.getMinutes().toString().padStart(2, '0');
                const ss = now.getSeconds().toString().padStart(2, '0');
                document.getElementById(`digital-${index}`).innerHTML = 
                    `<span class="tech-font-bold">${hh}:${mm}</span><span class="tech-font-light opacity-70">:${ss}</span>`;
            });
        }

        function describeArc(x, y, r, start, end, largeArc) {
            const startR = start * Math.PI / 180;
            const endR = end * Math.PI / 180;
            const x1 = x + r * Math.cos(startR);
            const y1 = y + r * Math.sin(startR);
            const x2 = x + r * Math.cos(endR);
            const y2 = y + r * Math.sin(endR);
            return `M ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2}`;
        }

        createClocks();
        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
