<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Market Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #ffffff; font-family: sans-serif; }
        .market-card { background: #0a0a0a; border-left: 4px solid #333; }
        /* Contenedor cuadrado garantizado */
        .clock-wrapper { width: 80px; height: 80px; flex-shrink: 0; }
        .clock-svg { width: 100%; height: 100%; display: block; }
        .hand { stroke-linecap: round; transform-origin: 40px 40px; transition: transform 0.2s linear; }
        .hour-hand { stroke: #ffffff; stroke-width: 4; }
        .min-hand { stroke: #e5e7eb; stroke-width: 2.5; }
        .sec-hand { stroke: #ef4444; stroke-width: 1.5; }
        .tick { stroke: #6b7280; stroke-width: 1.5; }
    </style>
</head>
<body class="p-4">
    <header class="mb-6 border-b border-gray-900 pb-4">
        <h1 class="text-lg font-semibold">Mercados Globales</h1>
        <select id="user-tz" class="bg-[#111] text-xs border border-gray-800 p-2 rounded mt-2 w-full text-white">
            <option value="America/Argentina/Buenos_Aires">Buenos Aires (GMT-3)</option>
            <option value="UTC">UTC (GMT+0)</option>
            <option value="America/New_York">New York (EST)</option>
            <option value="Europe/London">London (GMT)</option>
            <option value="Asia/Tokyo">Tokyo (JST)</option>
        </select>
    </header>

    <div id="clock-grid" class="space-y-3"></div>

    <script>
        const markets = [
            { name: "New York", tz: "America/New_York" },
            { name: "London", tz: "Europe/London" },
            { name: "Tokyo", tz: "Asia/Tokyo" },
            { name: "Sydney", tz: "Australia/Sydney" }
        ];

        function createClocks() {
            const grid = document.getElementById('clock-grid');
            markets.forEach((m, index) => {
                const card = document.createElement('div');
                card.className = 'market-card p-3 rounded-r-lg flex items-center gap-4';
                card.innerHTML = `
                    <div class="clock-wrapper">
                        <svg class="clock-svg" viewBox="0 0 80 80">
                            <circle cx="40" cy="40" r="38" stroke="#333" stroke-width="2" fill="none"/>
                            <g id="ticks-${index}"></g>
                            <line id="hour-${index}" class="hand hour-hand" x1="40" y1="40" x2="40" y2="20"/>
                            <line id="min-${index}" class="hand min-hand" x1="40" y1="40" x2="40" y2="12"/>
                            <line id="sec-${index}" class="hand sec-hand" x1="40" y1="40" x2="40" y2="8"/>
                            <circle cx="40" cy="40" r="2" fill="#ef4444"/>
                        </svg>
                    </div>
                    <div class="flex-grow flex justify-between items-center">
                        <div>
                            <h2 class="text-sm font-bold">${m.name}</h2>
                            <p class="text-[10px] text-gray-400 uppercase">${m.tz.split('/')[1]}</p>
                        </div>
                        <div id="digital-${index}" class="font-mono text-lg font-bold">00:00:00</div>
                    </div>
                `;
                grid.appendChild(card);
                drawTicks(index);
            });
        }

        function drawTicks(idx) {
            const g = document.getElementById(`ticks-${idx}`);
            for (let i = 0; i < 60; i++) {
                const angle = i * 6;
                const isHour = i % 5 === 0;
                const tick = document.createElementNS("http://www.w3.org/2000/svg", "line");
                tick.setAttribute("x1", 40 + 34 * Math.cos(angle * Math.PI / 180));
                tick.setAttribute("y1", 40 + 34 * Math.sin(angle * Math.PI / 180));
                tick.setAttribute("x2", 40 + (isHour ? 38 : 36) * Math.cos(angle * Math.PI / 180));
                tick.setAttribute("y2", 40 + (isHour ? 38 : 36) * Math.sin(angle * Math.PI / 180));
                tick.setAttribute("class", "tick");
                g.appendChild(tick);
            }
        }

        function update() {
            markets.forEach((m, index) => {
                const now = new Date(new Date().toLocaleString("en-US", { timeZone: m.tz }));
                const h = now.getHours();
                const min = now.getMinutes();
                const sec = now.getSeconds();
                
                const hDeg = (h % 12) * 30 + min * 0.5;
                const mDeg = min * 6 + sec * 0.1;
                const sDeg = sec * 6;

                // Rotación directa sobre el centro 40,40
                document.getElementById(`hour-${index}`).setAttribute('transform', `rotate(${hDeg} 40 40)`);
                document.getElementById(`min-${index}`).setAttribute('transform', `rotate(${mDeg} 40 40)`);
                document.getElementById(`sec-${index}`).setAttribute('transform', `rotate(${sDeg} 40 40)`);
                document.getElementById(`digital-${index}`).innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            });
        }

        createClocks();
        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
